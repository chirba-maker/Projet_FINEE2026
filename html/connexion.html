<!DOCTYPE html>
<html class="light" lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Connexion - FINEE | Forum de l'Innovation Numérique</title>
    <script src="../lib/tailwind.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans:wght@400;600&family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0" />
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                "colors": {
                        "surface-container-highest": "#e0e3e5",
                        "inverse-on-surface": "#eef1f3",
                        "primary": "#1A365D",
                        "secondary": "#00B5D8",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed-variant": "#703700",
                        "surface-variant": "#e0e3e5",
                        "on-tertiary-container": "#e88532",
                        "secondary-fixed-dim": "#00B5D8",
                        "secondary-container": "#e0f7fa",
                        "outline-variant": "#c4c6cf",
                        "on-secondary-fixed-variant": "#004e5e",
                        "on-surface-variant": "#43474e",
                        "surface-container": "#ebeef0",
                        "surface-tint": "#1A365D",
                        "tertiary-container": "#572900",
                        "tertiary-fixed": "#ffdcc5",
                        "primary-fixed-dim": "#adc7f7",
                        "on-primary-container": "#86a0cd",
                        "tertiary": "#e88532",
                        "on-error": "#ffffff",
                        "on-surface": "#181c1e",
                        "outline": "#74777f",
                        "on-tertiary-fixed": "#301400",
                        "on-primary-fixed-variant": "#2d476f",
                        "on-primary-fixed": "#001b3c",
                        "surface-container-low": "#f1f4f6",
                        "on-secondary-container": "#005c70",
                        "surface-dim": "#d7dadc",
                        "surface-bright": "#f7fafc",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "background": "#f7fafc",
                        "tertiary-fixed-dim": "#ffb783",
                        "surface": "#f7fafc",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#e5e9eb",
                        "secondary-fixed": "#b2ebff",
                        "inverse-surface": "#2d3133",
                        "primary-container": "#1a365d",
                        "inverse-primary": "#adc7f7",
                        "on-secondary-fixed": "#001f27",
                        "primary-fixed": "#d6e3ff",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "on-background": "#181c1e"
                },
                "fontFamily": {
                    "h1": ["Montserrat"],
                    "body-md": ["Open Sans"]
                }
              }
            }
          }
    </script>
    <link rel="stylesheet" href="../css/connexion.css">
    <link rel="stylesheet" href="../css/footer_premium.css">
</head>
<body class="bg-[#F8FAFC] font-body-md text-on-surface selection:bg-secondary/20 selection:text-primary">

    <!-- Back to Home Button -->
    <a href="index.html" class="fixed top-8 left-8 z-[100] flex items-center gap-2 px-4 py-2 bg-white/80 backdrop-blur-md border border-slate-200 rounded-xl text-primary font-bold text-xs uppercase tracking-widest shadow-sm hover:shadow-xl hover:-translate-y-0.5 transition-all active:scale-95 group">
        <span class="material-symbols-outlined text-sm group-hover:-translate-x-1 transition-transform">arrow_back</span>
        Retour à l'accueil
    </a>

    <main class="min-h-screen w-full flex flex-col md:flex-row">
        <!-- Visual Section: Left side -->
        <section class="hidden md:flex md:w-1/2 relative items-center justify-center p-lg overflow-hidden text-white bg-slate-900">
            <div class="absolute inset-0 z-0 opacity-70">
                <img class="w-full h-full object-cover" alt="Abstract Background" src="../assets/auth_bg.png"/>
                <div class="absolute inset-0 bg-gradient-to-br from-primary/80 via-transparent to-primary/40"></div>
            </div>
            <div class="relative z-10 max-w-lg text-white">
                <div class="mb-8 inline-flex items-center px-4 py-1.5 rounded-full bg-secondary/10 border border-secondary/20 text-secondary-fixed-dim text-[12px] font-bold uppercase tracking-[0.2em]">
                    <span class="mr-3 h-2 w-2 rounded-full bg-secondary animate-pulse"></span>
                    Édition 2026
                </div>
                <h1 class="font-h1 text-[56px] leading-[1.1] mb-6 font-bold tracking-tight">L'innovation au cœur de Labé.</h1>
                <p class="font-body-lg text-[20px] text-slate-300/90 leading-relaxed mb-10 max-w-md">
                    Connectez-vous pour gérer vos projets et suivre le forum.
                </p>
            </div>
        </section>
        <!-- Form Section: Right side -->
        <section class="w-full md:w-1/2 flex flex-col items-center justify-center p-gutter bg-[#F8FAFC]">
            <div class="w-full max-w-[440px]">
                <div class="glass-card p-10 rounded-2xl border border-white bg-white shadow-sm hover:shadow-xl transition-all duration-300">
                <div class="mb-10">
                    <h2 class="text-[32px] text-primary mb-2 font-black tracking-tight flex items-center justify-between">
                        Bon retour !
                        <a href="index.html" class="flex items-center justify-center w-12 h-12 bg-slate-100 text-slate-400 hover:text-primary hover:bg-slate-200 rounded-xl transition-all" title="Retour à l'accueil">
                            <span class="material-symbols-outlined text-2xl">home</span>
                        </a>
                    </h2>
                    <p class="text-slate-500 font-bold text-sm uppercase tracking-widest">Espace Étudiant FINEE</p>
                </div>
                    <form class="space-y-6" id="loginForm">
                        <div class="space-y-2">
                            <label class="text-[11px] font-black text-primary/60 uppercase tracking-widest ml-1" for="email">Email Universitaire</label>
                            <div class="relative group">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-[20px]">alternate_email</span>
                                <input class="w-full pl-12 pr-4 py-4 rounded-xl border border-slate-100 bg-slate-50 focus:bg-white focus:border-secondary focus:ring-4 focus:ring-secondary/5 transition-all outline-none text-sm font-bold" id="email" name="email" placeholder="votre.nom@univ-labe.edu.gn" required type="email"/>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <div class="flex justify-between items-center ml-1">
                                <label class="text-[11px] font-black text-primary/60 uppercase tracking-widest" for="password">Mot de passe</label>
                            </div>
                            <div class="relative group">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-[20px]">lock</span>
                                <input class="w-full pl-12 pr-12 py-4 rounded-xl border border-slate-100 bg-slate-50 focus:bg-white focus:border-secondary focus:ring-4 focus:ring-secondary/5 transition-all outline-none text-sm font-bold" id="password" name="password" placeholder="••••••••" required type="password"/>
                                <button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary p-1" onclick="togglePass('password', 'eyeIcon')" type="button">
                                    <span class="material-symbols-outlined text-[20px]" id="eyeIcon">visibility</span>
                                </button>
                            </div>
                        </div>
                        <button class="w-full bg-primary text-white font-black text-sm uppercase tracking-widest py-5 rounded-xl shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3" type="submit">
                            Se connecter <span class="material-symbols-outlined text-sm">arrow_forward</span>
                        </button>
                    </form>
                    <div id="loginError" class="mt-4 text-red-500 text-xs font-black text-center hidden italic uppercase">Identifiants incorrects</div>
                    <div class="mt-10 pt-8 border-t border-slate-50 text-center">
                        <p class="text-slate-500 text-sm font-bold">
                            Pas encore de compte ? 
                            <a href="inscription.html" class="text-secondary hover:underline ml-1 font-black uppercase tracking-widest text-[11px]">Créer un compte →</a>
                        </p>
                        <a href="index.html" class="inline-block mt-4 text-slate-400 hover:text-primary font-bold text-[10px] uppercase tracking-widest transition-colors">
                            ← Retour à l'accueil
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="../js/connexion.js"></script>
</body>
</html>
